<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmer Assist - Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
        }

        .navbar {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .navbar-brand {
            font-size: 24px;
            font-weight: bold;
        }

        .navbar-menu {
            display: flex;
            gap: 20px;
        }

        .navbar-menu a {
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 5px;
        }

        .navbar-menu a.active {
            background: rgba(255, 255, 255, 0.3);
        }

        .logout-btn {
            background: #ff4757;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            height: calc(100vh - 80px);
            display: flex;
            flex-direction: column;
            padding: 0;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: white;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.ai {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 10px;
            word-wrap: break-word;
            line-height: 1.5;
        }

        .message.user .message-content {
            background: #10b981;
            color: white;
            border-bottom-right-radius: 0;
        }

        .message.ai .message-content {
            background: #e5e7eb;
            color: #333;
            border-bottom-left-radius: 0;
        }

        .input-area {
            background: white;
            padding: 20px;
            border-top: 1px solid #e5e7eb;
            display: flex;
            gap: 10px;
        }

        textarea {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 14px;
            resize: none;
            height: 50px;
        }

        textarea:focus {
            outline: none;
            border-color: #10b981;
            box-shadow: 0 0 5px rgba(16, 185, 129, 0.2);
        }

        .send-btn {
            padding: 12px 25px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }

        .send-btn:hover:not(:disabled) {
            background: #059669;
        }

        .send-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .timestamp {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        .loading {
            display: flex;
            gap: 6px;
            padding: 12px 16px;
        }

        .loading-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
            animation: bounce 1.4s infinite;
        }

        .loading-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0);
                opacity: 0.5;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .message-content {
                max-width: 85%;
            }

            .navbar-menu {
                flex-direction: column;
                position: absolute;
                top: 60px;
                right: 10px;
                background: rgba(0, 0, 0, 0.2);
                padding: 10px;
                border-radius: 5px;
                gap: 5px;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-brand">🌾 Farmer Assist</div>
        <div class="navbar-menu">
            <a href="/dashboard/">Dashboard</a>
            <a href="/chat-ui/" class="active">Chat</a>
            <a href="/profile-ui/">Profile</a>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </nav>

    <!-- Chat Container -->
    <div class="container">
        <div class="chat-messages" id="chatMessages"></div>
        
        <div class="input-area">
            <textarea id="messageInput" placeholder="Ask me about farming, crops, weather, or anything related to agriculture..." rows="2"></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const chatMessagesDiv = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        function requireAuth() {
            const token = localStorage.getItem('idToken');
            if (!token) {
                window.location.href = '/login-ui/';
                throw new Error('redirect');
            }
        }

        function authFetch(url, options={}) {
            const token = localStorage.getItem('idToken');
            if (!token) throw new Error('Not authenticated');
            options.headers = options.headers || {};
            options.headers['Authorization'] = 'Bearer ' + token;
            return fetch(url, options);
        }

        // Check auth on load
        window.addEventListener('load', () => {
            try {
                requireAuth();
                loadChatHistory();
            } catch (e) {
                // redirected
            }
        });

        // Send message on Enter
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        async function loadChatHistory() {
            try {
                const token = localStorage.getItem('idToken');
                const response = await fetch('/chat-history/', {
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                });

                if (response.ok) {
                    const history = await response.json();
                    history.forEach(msg => {
                        displayMessage(msg.message, msg.role);
                    });
                    scrollToBottom();
                }
            } catch (error) {
                console.error('Error loading chat history:', error);
            }
        }

        async function sendMessage() {
            const message = messageInput.value.trim();

            if (!message) {
                return;
            }

            // Display user message
            displayMessage(message, 'user');
            messageInput.value = '';
            sendBtn.disabled = true;

            // Show loading indicator
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message ai';
            loadingDiv.innerHTML = '<div class="message-content"><div class="loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div></div>';
            chatMessagesDiv.appendChild(loadingDiv);
            scrollToBottom();

            try {
                const token = localStorage.getItem('idToken');
                const response = await fetch('/chat/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ message: message })
                });

                if (!response.ok) {
                    throw new Error('Failed to get response');
                }

                const data = await response.json();
                
                // Remove loading indicator
                loadingDiv.remove();

                // Display AI response
                displayMessage(data.response, 'assistant');

            } catch (error) {
                loadingDiv.remove();
                const errorDiv = document.createElement('div');
                errorDiv.className = 'message ai';
                errorDiv.innerHTML = `<div class="message-content"><div class="error-message">Error: ${error.message}</div></div>`;
                chatMessagesDiv.appendChild(errorDiv);
                scrollToBottom();
            } finally {
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }

        function displayMessage(text, role) {
            // ensure we have a string before using replace
            text = String(text || '');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role === 'user' ? 'user' : 'ai'}`;

            const now = new Date();
            const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            messageDiv.innerHTML = `
                <div class="message-content">
                    ${text.replace(/\n/g, '<br>')}
                    <div class="timestamp">${timeString}</div>
                </div>
            `;

            chatMessagesDiv.appendChild(messageDiv);
            scrollToBottom();
        }

        function scrollToBottom() {
            chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
        }

        function logout() {
            localStorage.removeItem('idToken');
            localStorage.removeItem('uid');
            localStorage.removeItem('email');
            localStorage.removeItem('username');
            window.location.href = '/login-ui/';
        }
    </script>
</body>
</html>
