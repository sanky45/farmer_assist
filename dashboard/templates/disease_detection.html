<!DOCTYPE html>
<html>
<head>
    <title>Pest & Disease Detection</title>
    <style>
        .disease-container {
            max-width: 900px;
            margin: 20px auto;
            padding: 20px;
        }
        
        .upload-section {
            border: 3px dashed #27AE60;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 30px;
        }
        
        .upload-section:hover {
            background: #f0f9f4;
            border-color: #229954;
        }
        
        .upload-section.dragover {
            background: #e8f8f5;
            border-color: #1ABC9C;
        }
        
        #imageInput {
            display: none;
        }
        
        .preview-section {
            margin: 30px 0;
        }
        
        #previewImage {
            max-width: 400px;
            border-radius: 10px;
            margin: 20px 0;
        }
        
        .results-section {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin: 30px 0;
        }
        
        .disease-card {
            background: white;
            border-left: 5px solid #E74C3C;
            padding: 20px;
            margin: 20px 0;
            border-radius: 5px;
        }
        
        .severity-mild {
            border-left-color: #F39C12;
        }
        
        .severity-moderate {
            border-left-color: #E67E22;
        }
        
        .severity-severe {
            border-left-color: #C0392B;
        }
        
        .treatment-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 20px 0;
        }
        
        .treatment-option {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
        }
        
        .treatment-option h4 {
            margin: 0 0 10px 0;
        }
        
        .treatment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .organic-tag {
            background: #27AE60;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
        }
        
        .chemical-tag {
            background: #3498DB;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
        }
        
        .cost {
            color: #27AE60;
            font-weight: bold;
            font-size: 16px;
        }
        
        .prevention-section {
            background: #e8f8f5;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        
        .prevention-section ul {
            margin: 10px 0;
            padding-left: 20px;
        }
        
        .prevention-section li {
            margin: 10px 0;
            line-height: 1.6;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #27AE60;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
            display: none;
        }
    </style>
</head>
<body>
    <div class="disease-container">
        <h1>🔍 Pest & Disease Detection</h1>
        <p>Upload a photo of your crop → AI detects disease/pest → Get treatment options</p>
        
        <!-- Upload Section -->
        <div class="upload-section" id="uploadArea">
            <h3>📸 Upload Crop Photo</h3>
            <p>Drag & drop or click to select</p>
            <input type="file" id="imageInput" accept="image/*">
        </div>
        
        <!-- Preview -->
        <div class="preview-section" id="previewSection" style="display: none;">
            <img id="previewImage" src="">
            <label>Crop Type (Optional):
                <input type="text" id="cropType" placeholder="e.g., tomato, wheat, corn">
            </label>
            <button id="detectBtn" onclick="detectDisease()" style="padding: 10px 20px; background: #27AE60; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px;">
                Detect Disease
            </button>
        </div>
        
        <!-- Loading -->
        <div class="loading" id="loadingSpinner">
            <div class="spinner"></div>
            <p>Analyzing image... Please wait</p>
        </div>
        
        <!-- Error -->
        <div class="error-message" id="errorMessage"></div>
        
        <!-- Results -->
        <div class="results-section" id="resultsSection" style="display: none;">
            <div class="disease-card" id="diseaseCard"></div>
        </div>
        
        <!-- History -->
        <div id="historySection" style="margin-top: 50px;">
            <h2>📋 Detection History</h2>
            <div id="detectionHistory"></div>
        </div>
    </div>
    
    <script>
        // token helper based on stored idToken
        function requireAuth() {
            const token = localStorage.getItem('idToken');
            if (!token) {
                window.location.href = '/login-ui/';
                throw new Error('redirect');
            }
        }
        function authFetch(url, options={}) {
            const token = localStorage.getItem('idToken');
            if (!token) throw new Error('Not authenticated');
            options.headers = options.headers || {};
            options.headers['Authorization'] = 'Bearer ' + token;
            return fetch(url, options);
        }

        // ensure user is logged in before anything else
        window.addEventListener('load', () => {
            try {
                requireAuth();
            } catch (e) {
                // redirecting
            }
        });
        const uploadArea = document.getElementById('uploadArea');
        const imageInput = document.getElementById('imageInput');
        const previewSection = document.getElementById('previewSection');
        const previewImage = document.getElementById('previewImage');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const resultsSection = document.getElementById('resultsSection');
        const diseaseCard = document.getElementById('diseaseCard');
        const errorMessage = document.getElementById('errorMessage');
        
        // store selected file (needed for drag-drop)
        let selectedFile = null;
        
        // File upload handling
        uploadArea.addEventListener('click', () => imageInput.click());
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });
        
        imageInput.addEventListener('change', () => {
            handleFiles(imageInput.files);
        });
        
        function handleFiles(files) {
            if (files.length > 0) {
                const file = files[0];
                selectedFile = file; // remember for later
                // also update hidden input so FormData can pick it up
                try {
                    const dt = new DataTransfer();
                    dt.items.add(file);
                    imageInput.files = dt.files;
                } catch (e) {
                    // some browsers may not allow setting files, but selectedFile is enough
                }

                const reader = new FileReader();
                
                reader.onload = (e) => {
                    previewImage.src = e.target.result;
                    previewSection.style.display = 'block';
                    uploadArea.style.display = 'none';
                };
                
                reader.readAsDataURL(file);
            }
        }
        
        async function detectDisease() {
            const cropType = document.getElementById('cropType').value;
            const formData = new FormData();
            // try to use selectedFile first (drag-drop), fallback to input
            const file = selectedFile || (imageInput.files && imageInput.files[0]);
            if (!file) {
                showError('Please provide an image file before clicking detect.');
                return;
            }
            formData.append('image', file);
            if (cropType) formData.append('crop_type', cropType);
            
            loadingSpinner.style.display = 'block';
            resultsSection.style.display = 'none';
            errorMessage.style.display = 'none';
            
            try {
                const response = await authFetch('/disease-detection/', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                loadingSpinner.style.display = 'none';
                
                if (data.success) {
                    displayResults(data);
                    loadHistory();
                } else {
                    showError(data.error || 'Could not detect disease');
                }
            } catch (error) {
                loadingSpinner.style.display = 'none';
                showError(error.message);
            }
        }
        
        function displayResults(data) {
            // Extract disease data from nested structure
            const diseaseData = data.disease_data || data;
            const severity = diseaseData.severity || 'Unknown';
            const severityClass = `severity-${severity.toLowerCase()}`;
            
            // Parse organic solutions
            const organicSolutions = diseaseData.organic_solutions || [];
            const chemicalSolutions = diseaseData.chemical_solutions || [];
            
            const treatmentsHTML = `
                <div class="treatment-grid">
                    <div>
                        <h4>🌿 Organic Solutions</h4>
                        ${organicSolutions.map(t => `
                            <div class="treatment-option">
                                <div class="treatment-header">
                                    <span class="organic-tag">ORGANIC</span>
                                </div>
                                <strong>${t.name}</strong><br>
                                💰 Cost: ₹${t.cost}<br>
                                💧 Dosage: ${t.dosage || 'N/A'}<br>
                                ⏱️ Duration: ${t.duration_days || 14} days
                            </div>
                        `).join('') || '<p>No organic solutions available</p>'}
                    </div>
                    <div>
                        <h4>💊 Chemical Solutions</h4>
                        ${chemicalSolutions.map(t => `
                            <div class="treatment-option">
                                <div class="treatment-header">
                                    <span class="chemical-tag">CHEMICAL</span>
                                </div>
                                <strong>${t.name}</strong><br>
                                💰 Cost: ₹${t.cost}<br>
                                💧 Dosage: ${t.dosage || 'N/A'}<br>
                                ⏱️ Duration: ${t.duration_days || 21} days
                            </div>
                        `).join('') || '<p>No chemical solutions available</p>'}
                    </div>
                </div>
            `;
            
            const prevention = diseaseData.prevention_tips || [];
            const preventionHTML = `
                <div class="prevention-section">
                    <h4>✅ Prevention & Care Tips</h4>
                    <ul>
                        ${prevention.map(p => `<li>${p}</li>`).join('') || '<li>No prevention tips available</li>'}
                    </ul>
                </div>
            `;
            
            const reason = diseaseData.reason || 'Unable to determine cause';
            const timeline = diseaseData.recovery_timeline || {};
            const impact = diseaseData.yield_impact || {};
            const immediateAction = diseaseData.immediate_action || 'Consult a local agricultural expert';
            
            diseaseCard.innerHTML = `
                <h2>🔍 Detection Result</h2>
                <p style="color: #666; margin: 10px 0;">Confidence: ${diseaseData.confidence || 'N/A'}%</p>
                
                <div style="margin: 20px 0;">
                    <h3 style="color: #27AE60;">Disease: <strong>${diseaseData.disease_detected || 'Unknown'}</strong></h3>
                    <p style="display: inline-block; background: #fff3cd; padding: 10px 15px; border-radius: 20px; margin: 10px 0;">
                        Severity: <strong>${severity}</strong>
                    </p>
                    <p style="margin: 10px 0; font-size: 14px; color: #555;">📈 Damage: ${diseaseData.leaf_damage_percentage || 0}% of leaves affected</p>
                </div>
                
                <div style="background: #eef5e5; padding: 15px; border-radius: 5px; margin: 20px 0;">
                    <h4 style="margin-top: 0;">💡 Why This Disease Occurred:</h4>
                    <p>${reason}</p>
                </div>
                
                <h3>📋 Treatment Options</h3>
                ${treatmentsHTML}
                
                <div style="background: #cfe2ff; padding: 15px; border-radius: 5px; margin: 20px 0;">
                    <h4 style="margin-top: 0;">📅 Recovery Timeline:</h4>
                    <p><strong>With Treatment:</strong> ${timeline.with_treatment || 'N/A'}</p>
                    <p><strong>Without Treatment:</strong> ${timeline.without_treatment || 'N/A'}</p>
                </div>
                
                <div style="background: #fff3cd; padding: 15px; border-radius: 5px; margin: 20px 0;">
                    <h4 style="margin-top: 0;">💰 Financial Impact:</h4>
                    <p><strong>If Treated Early:</strong> ${impact.if_treated_early || 'N/A'}</p>
                    <p><strong>If Untreated:</strong> ${impact.if_untreated || 'N/A'}</p>
                    <p><strong>Estimated Loss:</strong> ${impact.financial_impact || 'N/A'}</p>
                </div>
                
                ${preventionHTML}
                
                <div style="background: #d1ecf1; padding: 15px; border-radius: 5px; margin: 20px 0;">
                    <h4 style="margin-top: 0;">🚨 Immediate Action:</h4>
                    <p style="font-size: 15px; color: #0c5460;"><strong>${immediateAction}</strong></p>
                </div>
                
                <p style="color: #666; margin-top: 20px; font-size: 14px;">
                    📊 Similar cases reported: ${diseaseData.similar_cases_count || 0} farmers
                </p>
                
                <button onclick="shareFeedback(${data.detection_id})" style="margin-top: 20px; padding: 10px 20px; background: #3498DB; color: white; border: none; border-radius: 5px; cursor: pointer;">
                    📝 Share Treatment Results
                </button>
            `;
            
            resultsSection.style.display = 'block';
        }
        
        function showError(msg) {
            errorMessage.textContent = msg;
            errorMessage.style.display = 'block';
        }
        
        async function loadHistory() {
            try {
                const response = await authFetch('/disease-history/');
                const data = await response.json();
                
                if (data.success) {
                    const historyDiv = document.getElementById('detectionHistory');
                    const detections = data.detections || [];
                    
                    if (detections.length === 0) {
                        historyDiv.innerHTML = '<p style="color: #999;">No disease detection history yet</p>';
                        return;
                    }
                    
                    historyDiv.innerHTML = detections.map(d => `
                        <div style="background: white; padding: 15px; margin: 10px 0; border-radius: 5px; border-left: 4px solid #3498DB;">
                            <strong>${d.detected_disease || 'Unknown Disease'}</strong> - <span style="color: #666;">${d.severity || 'Unknown'}</span>
                            <br>
                            <small style="color: #999;">
                                ${new Date(d.created_at).toLocaleDateString()} | Confidence: ${d.confidence_score || 'N/A'}%
                            </small>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Error loading history:', error);
            }
        }
        
        function shareFeedback(detectionId) {
            alert('Feedback form: What treatment did you use? How effective? Coming soon!');
        }
        
        // Load history on page load (token check happens earlier via requireAuth)
        window.addEventListener('load', () => {
            requireAuth();
            loadHistory();
        });
    </script>
</body>
</html>
