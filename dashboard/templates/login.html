<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmer Assist - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 420px;
            padding: 40px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #10b981;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .logo p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #10b981;
            box-shadow: 0 0 5px rgba(16, 185, 129, 0.2);
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn:hover {
            background: #059669;
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .signup-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }

        .signup-link a {
            color: #10b981;
            text-decoration: none;
            font-weight: 600;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        .error-message {
            color: #dc2626;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }

        .loader {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .loader span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
            margin: 0 4px;
            animation: bounce 1.4s infinite;
        }

        .loader span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loader span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0);
                opacity: 0.5;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>🌾 Farmer Assist</h1>
            <p>Your AI Agricultural Companion</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter your email" required>
                <div class="error-message" id="emailError"></div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
                <div class="error-message" id="passwordError"></div>
            </div>

            <div class="loader" id="loader">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <button type="submit" class="btn" id="loginBtn">Login</button>
            <div class="error-message" id="generalError"></div>
        </form>

        <div class="signup-link">
            Don't have an account? <a href="/signup-ui/">Sign Up here</a>
        </div>
    </div>

    <!-- use compat libs so existing firebase.auth() code works -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBsuxloLI3mCbDM0iEGuKPir0vPyLvI1LI",
            authDomain: "farmerassistant-a3fa3.firebaseapp.com",
            projectId: "farmerassistant-a3fa3",
            storageBucket: "farmerassistant-a3fa3.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abc123def456"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const loader = document.getElementById('loader');
        const generalError = document.getElementById('generalError');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearErrors();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showError('generalError', 'Email and password are required');
                return;
            }

            showLoader();
            loginBtn.disabled = true;

            try {
                // Sign in with Firebase
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;
                const idToken = await user.getIdToken();

                // Save token to localStorage
                localStorage.setItem('idToken', idToken);
                localStorage.setItem('uid', user.uid);
                localStorage.setItem('email', user.email);

                // Redirect to dashboard
                setTimeout(() => {
                    window.location.href = '/dashboard/';
                }, 500);

            } catch (error) {
                hideLoader();
                loginBtn.disabled = false;

                if (error.code === 'auth/user-not-found') {
                    showError('generalError', 'No account found with this email');
                } else if (error.code === 'auth/wrong-password') {
                    showError('generalError', 'Incorrect password');
                } else if (error.code === 'auth/invalid-email') {
                    showError('generalError', 'Invalid email address');
                } else {
                    showError('generalError', error.message);
                }
            }
        });

        function showError(elementId, message) {
            const errorElement = document.getElementById(elementId);
            errorElement.textContent = message;
            errorElement.style.display = 'block';
        }

        function clearErrors() {
            document.querySelectorAll('.error-message').forEach(el => {
                el.style.display = 'none';
            });
        }

        function showLoader() {
            loader.style.display = 'block';
            loginBtn.textContent = 'Logging in...';
        }

        function hideLoader() {
            loader.style.display = 'none';
            loginBtn.textContent = 'Login';
        }

        // Check if already logged in
        window.addEventListener('load', () => {
            const token = localStorage.getItem('idToken');
            if (token) {
                window.location.href = '/dashboard/';
            }
        });
    </script>
</body>
</html>
