name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations & checks
        env:
          DJANGO_SETTINGS_MODULE: core.settings
        run: |
          python manage.py migrate --noinput
          python manage.py check

      - name: Run tests
        env:
          DJANGO_SETTINGS_MODULE: core.settings
        run: |
          pytest -q

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        if: github.event_name == 'push'
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t farmer_assist:latest .

      - name: Optionally push Docker image (if configured)
        if: github.event_name == 'push'
        run: |
          docker tag farmer_assist:latest ${{ secrets.DOCKERHUB_USERNAME }}/farmer_assist:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/farmer_assist:latest

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy to remote server by SSH
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script: |
            docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/farmer_assist:latest
            docker stop farmer_assist || true
            docker rm farmer_assist || true
            docker run -d \
              --name farmer_assist \
              -p 8000:8000 \
              --env-file /path/to/your/.env \
              --restart always \
              ${{ secrets.DOCKERHUB_USERNAME }}/farmer_assist:latest
